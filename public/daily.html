<!DOCTYPE html>
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-637SKJYBQG"></script>
    <link rel="stylesheet" href="https://unpkg.com/tachyons@4.12.0/css/tachyons.min.css"/>
    <link rel="stylesheet" href="fmcolors.css" />
    <link rel="stylesheet" href="fmstyle.css" />
    <link rel="stylesheet" href="fmtricks.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dragscroll/0.0.8/dragscroll.min.js"></script>
    <script src="onload.js"></script>
    <script src="topbar_script.js"></script>
    <style>
    .blog-card {
        cursor: pointer;
        padding: 0.25em 0;
        border-bottom: 1px solid rgba(8, 8, 73, 0.08);
        margin: 0;
    }
    .blog-card:hover .blog-card-preview {
        background: rgb(244, 255, 125);
    }
    .blog-card-preview {
        font-size: 13px;
        color: var(--text-color);
        line-height: 1.4;
    }
    .blog-card-date {
        font-style: italic;
        opacity: 0.7;
    }
    .blog-pagination {
        display: flex;
        gap: 4px;
        margin: 1.2em 0 0.5em;
        flex-wrap: wrap;
    }
    .blog-page-btn {
        border: 1px solid rgba(8, 8, 73, 0.2);
        background: none;
        padding: 3px 8px;
        cursor: pointer;
        font-size: 12px;
        font-family: inherit;
    }
    .blog-page-btn:hover:not(:disabled) {
        background: rgb(244, 255, 125);
    }
    .blog-page-btn.active {
        background: rgba(8, 8, 73, 0.08);
        font-weight: bold;
    }
    .blog-page-btn:disabled {
        opacity: 0.3;
        cursor: default;
    }
    </style>
</head>
<body>
<div class="main">
    <div class="daily-blog"></div>
    <script src="daily-loader.js"></script>
</div>
</body>

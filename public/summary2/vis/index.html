<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Unica+One&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <title>Accordion </title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(2px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
      color: #1a5f3c;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }
    .modal h3 { margin: 0 0 10px; font-size: 18px; }
    .modal p { margin: 0 0 12px; font-size: 14px; color: #2f6f4d; }
    .modal form { display: flex; gap: 8px; }
    .modal input[type="email"] {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #c9c3b5;
      border-radius: 8px;
      font-size: 14px;
    }
    .modal button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #1a5f3c;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    .modal .close-btn {
      background: transparent;
      color: #1a5f3c;
      font-weight: 700;
      padding: 6px 8px;
      float: right;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="page-title">sum<span class="inserted">u</span>mary</h1>
    <p class="subtitle">Guess the country by expanding the summary below.</p>

    <div class="guess-container">
      
      <div class="autocomplete-container">
        <input type="text" class="guess-input" id="guessInput" placeholder="Enter your guess..." autocomplete="off">
        <div class="autocomplete-dropdown" id="autocompleteDropdown"></div>
      </div>
      <div class="guess-actions">
      <div class="hint-counter">
      <span class="eye-icon">👁️</span>
      <span id="hintCount">0</span> splits
      </div>
        <button class="guess-btn" id="guessBtn">Guess</button>
        <button class="guess-btn giveup-btn" id="giveUpBtn">Give up</button>
      </div>
    </div>

    <div id="feedback"></div>

    <select class="movie-select" id="movieSelect">
      <option value="">— Select a country —</option>
    </select>

    <div class="tree-container" id="treeContainer">
      <p class="hint">Select a country above to begin exploring its summary.</p>
    </div>

    <div id="emailModal" class="modal-overlay">
      <div class="modal">
        <button class="close-btn" onclick="closeEmailModal()">×</button>
        <h3>Play more games</h3>
        <form id="emailForm">
          <input id="emailInput" type="email" name="email" placeholder="you@example.com" required />
          <button type="submit">Submit</button>
        </form>
      </div>
    </div>

  </div>

  <script>

    const LEVELS = ["level_5", "level_4", "level_3", "level_2", "level_1"];
    let currentData = null;
    let parsedLevels = {};
    let visibleNodes = [];
    let currentCountryTitle = null;
    let currentCountryFile = null;
    let guessCount = 0;
    let clickCount = 0;
    let hasWon = false;

    // Country catalog loaded from countries_titles.csv
    let countries = [];         // [{ title, filename }]
    let countryTitles = [];     // [title]
    let fuse = null;            // Fuse instance for autocomplete

    function toFilename(value) {
      return (value || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    async function loadCountriesData() {
      try {
        // Load titles from CSV (expects header: country,url,wiki_country)
        const response = await fetch('../data/countries/countries_titles.csv');
        const text = await response.text();
        const lines = text.trim().split('\n');

        countries = [];
        countryTitles = [];
        for (let i = 1; i < lines.length; i++) {
          const [countryRaw, , wikiCountryRaw] = lines[i].split(',');
          const country = (countryRaw || "").replace(/^"|"$/g, '').trim();
          const wikiCountry = (wikiCountryRaw || "").replace(/^"|"$/g, '').trim();
          const title = wikiCountry || country;
          const filename = toFilename(wikiCountry || country);
          if (!title || !filename) continue;
          countries.push({ title, filename });
          countryTitles.push(title);
        }

        fuse = new Fuse(countryTitles, {
          threshold: 0.3,
          includeScore: true,
          ignoreLocation: true
        });

        const movieSelect = document.getElementById("movieSelect");

        countries.forEach(country => {
          const opt = document.createElement("option");
          opt.value = country.filename;
          opt.textContent = country.title;
          movieSelect.appendChild(opt);
        });

        selectRandomCountry();
      } catch (err) {
        console.error('Failed to load countries data', err);
      }
    }

    function selectRandomCountry() {
      if (!countries.length) return;

      const seenFilenames = JSON.parse(localStorage.getItem('seenCountryFilenames')) || [];
      const availableCountries = countries.filter(country => !seenFilenames.includes(country.filename));

      if (availableCountries.length === 0) {
        localStorage.removeItem('seenCountryFilenames');
        return selectRandomCountry();
      }

      const picked = availableCountries[Math.floor(Math.random() * availableCountries.length)];
      seenFilenames.push(picked.filename);
      localStorage.setItem('seenCountryFilenames', JSON.stringify(seenFilenames));

      document.getElementById("movieSelect").value = picked.filename;
      currentCountryTitle = picked.title;
      currentCountryFile = picked.filename;
      guessCount = 0;
      clickCount = 0;
      hasWon = false;
      document.getElementById("feedback").innerHTML = "";
      document.getElementById("guessInput").value = "";
      document.getElementById("guessInput").disabled = false;
      document.getElementById("guessBtn").disabled = false;
      document.getElementById("giveUpBtn").disabled = false;
      updateHintCounter();
      loadCountry(currentCountryFile);
    }

    function normalizeTitle(title) {
      return title
        .toLowerCase()
        .replace(/[\(\)]/g, "") 
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s*(film|movie|country)\s*/g, "")  
        .replace(/\d{4}/g, "")
        .replace(/[^a-z0-9\s]/g, "")  
        .replace(/\s+/g, " ") 
        .trim();
    }

    function updateHintCounter() {
      document.getElementById("hintCount").textContent = clickCount;
    }

    function checkGuess() {
      if (hasWon) return;
      const guess = document.getElementById("guessInput").value.trim();
      if (!guess) return;
      guessCount++;
      const normalizedGuess = normalizeTitle(guess);
      const normalizedAnswer = normalizeTitle(currentCountryTitle || "");
      const feedbackEl = document.getElementById("feedback");
      if (normalizedGuess === normalizedAnswer) {
        hasWon = true;
        document.getElementById("guessInput").disabled = true;
        document.getElementById("guessBtn").disabled = true;
        document.getElementById("giveUpBtn").disabled = true;
        feedbackEl.innerHTML = `
          <div class="win-message">
            <h2>🎉 Correct!</h2>
        <p>The country was <strong>${escapeHtml(currentCountryTitle)}</strong></p>
            <p>You got it in ${guessCount} guess${guessCount !== 1 ? "es" : ""} using ${clickCount} split${clickCount !== 1 ? "s" : ""}!</p>
        <button class="play-again-btn" onclick="selectRandomCountry()">Play Again</button>
            <button class="play-again-btn" onclick="openEmailModal(event)">Play More</button>
            <a class="play-again-btn" style="background: none" href="mailto:eric_xia@brown.edu">
      <p>Feedback: eric_xia@brown.edu</p></a>
          </div>
        `;
      } else {
        feedbackEl.innerHTML = `
          <div class="feedback wrong">
            ❌ "${escapeHtml(guess)}" is not correct. Keep trying! (${guessCount} guess${guessCount !== 1 ? "es" : ""})
          </div>
        `;
        document.getElementById("guessInput").value = "";
        document.getElementById("guessInput").focus();
      }
    }

    function giveUp() {
      if (hasWon || !currentCountryTitle) return;
      hasWon = true;
      const feedbackEl = document.getElementById("feedback");
      document.getElementById("guessInput").disabled = true;
      document.getElementById("guessBtn").disabled = true;
      document.getElementById("giveUpBtn").disabled = true;
      feedbackEl.innerHTML = `
        <div class="win-message">
          <p>The country was <strong>${escapeHtml(currentCountryTitle)}</strong></p>
          <p>Splits used: ${clickCount}. Guesses made: ${guessCount}.</p>
          <button class="play-again-btn" onclick="selectRandomCountry()">Try another</button>
          <button class="play-again-btn" onclick="openEmailModal(event)">Play More</button>
          <a class="play-again-btn" href="mailto:eric_xia@brown.edu">Feedback</a>
        </div>
      `;
    }

    let selectedIndex = -1;
    const guessInput = document.getElementById("guessInput");
    const dropdown = document.getElementById("autocompleteDropdown");

    // Autocomplete functionality
    function updateAutocomplete() {
      const query = guessInput.value.trim();
      
      if (!query || hasWon) {
        dropdown.classList.remove("show");
        return;
      }

      const results = fuse ? fuse.search(query).slice(0, 8) : [];
      
      if (results.length === 0) {
        dropdown.classList.remove("show");
        return;
      }

      dropdown.innerHTML = results.map((result, idx) => 
        `<div class="autocomplete-item" data-index="${idx}" data-movie="${escapeHtml(result.item)}">${escapeHtml(result.item)}</div>`
      ).join("");
      
      dropdown.classList.add("show");
      selectedIndex = -1;
    }

    // Handle autocomplete item click
    dropdown.addEventListener("click", (e) => {
      const item = e.target.closest(".autocomplete-item");
      if (item) {
        guessInput.value = item.dataset.movie;
        dropdown.classList.remove("show");
        guessInput.focus();
      }
    });

    // Handle keyboard navigation
    guessInput.addEventListener("keydown", (e) => {
      const items = dropdown.querySelectorAll(".autocomplete-item");
      
      if (e.key === "ArrowDown") {
        e.preventDefault();
        selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
        updateSelection(items);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        selectedIndex = Math.max(selectedIndex - 1, -1);
        updateSelection(items);
      } else if (e.key === "Enter") {
        if (selectedIndex >= 0 && items[selectedIndex]) {
          e.preventDefault();
          guessInput.value = items[selectedIndex].dataset.movie;
          dropdown.classList.remove("show");
          checkGuess();
        } else {
          checkGuess();
        }
      } else if (e.key === "Escape") {
        dropdown.classList.remove("show");
      }
    });

    function updateSelection(items) {
      items.forEach((item, idx) => {
        item.classList.toggle("selected", idx === selectedIndex);
      });
      if (selectedIndex >= 0 && items[selectedIndex]) {
        items[selectedIndex].scrollIntoView({ block: "nearest" });
      }
    }

    // Update autocomplete on input
    guessInput.addEventListener("input", updateAutocomplete);

    // Close dropdown when clicking outside
    document.addEventListener("click", (e) => {
      if (!e.target.closest(".autocomplete-container")) {
        dropdown.classList.remove("show");
      }
    });

    // Event listeners for guessing
    document.getElementById("guessBtn").addEventListener("click", checkGuess);
    document.getElementById("giveUpBtn").addEventListener("click", giveUp);
    guessInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter" && selectedIndex < 0) {
        checkGuess();
      }
    });

    document.getElementById("movieSelect").addEventListener("change", (e) => {
      const filename = e.target.value;
      if (!filename) return;
      const selectedCountry = countries.find(country => country.filename === filename);
      if (!selectedCountry) return;
      currentCountryTitle = selectedCountry.title;
      currentCountryFile = selectedCountry.filename;
      guessCount = 0;
      clickCount = 0;
      hasWon = false;
      document.getElementById("feedback").innerHTML = "";
      document.getElementById("guessInput").value = "";
      document.getElementById("guessInput").disabled = false;
      document.getElementById("guessBtn").disabled = false;
      document.getElementById("giveUpBtn").disabled = false;
      updateHintCounter();
      loadCountry(currentCountryFile);
    });

    // Populate country dropdown happens after CSV load
    async function loadCountry(filename) {
      try {
        const response = await fetch(`../data/countries/level_summaries/${filename}.txt`);
        if (!response.ok) throw new Error("File not found");
        const text = await response.text();
        currentData = JSON.parse(text);
        console.log(currentData)
        parsedLevels = {};
        LEVELS.forEach(level => {
          parsedLevels[level] = parseSummaryLevel(currentData[level] || "");
        });
        // Start with single node covering all 16 level_1 indices
        visibleNodes = [{ start: 0, end: 16 }];
        render();
      } catch (err) {
        document.getElementById("treeContainer").innerHTML =
          `<p class="hint">Error loading country: ${err.message}</p>`;
      }
    }

    function parseSummaryLevel(text) {
      // Split by numbered items or newlines
      const lines = text.split(/\n/).map(s => s.trim()).filter(Boolean);
      return lines.map(line => line.replace(/^\d+[\.\)]\s*/, "").trim());
    }

    function getLevelAndIndex(start, end) {
      // Determine which level and index a range corresponds to
      const span = end - start;
      if (span === 16) return { level: 0, idx: 0 };      // level_5: 1 item
      if (span === 8) return { level: 1, idx: Math.floor(start / 8) };  // level_4: 2 items
      if (span === 4) return { level: 2, idx: Math.floor(start / 4) };  // level_3: 4 items
      if (span === 2) return { level: 3, idx: Math.floor(start / 2) };  // level_2: 8 items
      if (span === 1) return { level: 4, idx: start };   // level_1: 16 items
      return { level: 4, idx: start };
    }

    function render() {
      const container = document.getElementById("treeContainer");
      container.innerHTML = "";

      // Reset button
      if (visibleNodes.length > 1 || (visibleNodes.length === 1 && visibleNodes[0].end - visibleNodes[0].start < 16)) {
        const resetBtn = document.createElement("button");
        resetBtn.className = "reset-btn";
        resetBtn.textContent = "↩ Reset to top level";
        resetBtn.addEventListener("click", () => {
          visibleNodes = [{ start: 0, end: 16 }];
          render();
        });
        container.appendChild(resetBtn);
      }

      // Grid container
      const grid = document.createElement("div");
      grid.className = "tree-grid";

      visibleNodes.forEach((nodeRange, nodeIdx) => {
        const { level, idx } = getLevelAndIndex(nodeRange.start, nodeRange.end);
        const levelKey = LEVELS[level];
        const items = parsedLevels[levelKey] || [];
        const text = items[idx] || "(No text)";
        const span = nodeRange.end - nodeRange.start;
        const isLeaf = span === 1;

        const node = document.createElement("div");
        let widthClass = "";
        node.className = "node" + (!isLeaf ? " clickable" : " leaf")
        node.innerHTML = `<p>${escapeHtml(text)}</p>`;

        if (!isLeaf) {
          node.addEventListener("click", () => {
            clickCount++;
            updateHintCounter();
            const mid = nodeRange.start + span / 2;
            const newNodes = [
              ...visibleNodes.slice(0, nodeIdx),
              { start: nodeRange.start, end: mid },
              { start: mid, end: nodeRange.end },
              ...visibleNodes.slice(nodeIdx + 1)
            ];
            visibleNodes = newNodes;
            render();
          });
        }

        grid.appendChild(node);
      });

      container.appendChild(grid);

      // Count visible cards
      const cardCount = visibleNodes.length;
      const allLeaves = visibleNodes.every(n => n.end - n.start === 1);

      const hint = document.createElement("p");
      hint.className = "hint";
      if (allLeaves) {
        hint.textContent = `Fully expanded: ${cardCount} sentences at the most detailed level. Country: ${currentCountryTitle || ""}`;
      } else {
        hint.textContent = `${cardCount} card${cardCount !== 1 ? "s" : ""} visible. Click any card to expand into more detail.`;
      }
      container.appendChild(hint);
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function openEmailModal(e) {
      e?.preventDefault();
      const modal = document.getElementById('emailModal');
      modal.style.display = 'flex';
      document.getElementById('emailInput').focus();
    }
    function closeEmailModal() {
      document.getElementById('emailModal').style.display = 'none';
    }
    document.getElementById('emailForm').onsubmit = function(e) {
      e.preventDefault();
      const email = document.getElementById('emailInput').value;
      fetch('https://script.google.com/macros/s/AKfycbzDqoriWuwxLNVSv2zoj9l-qnN9gDMma1p7efXDhbmIUULT3BLg0vizs7m6-7YF1j0Lug/exec', {
        method: 'POST',
        body: JSON.stringify({ email })
      })
      .then(() => {
        const button = this.querySelector('button');
        button.textContent = 'Submitted ✓';
        button.disabled = true;
        setTimeout(() => {
          closeEmailModal();
          button.textContent = 'Submit';
          button.disabled = false;
          this.reset();
        }, 1000);
      })
      .catch(err => {
        console.error(err);
        alert('Error saving email.');
      });
    };
    window.addEventListener('click', (e) => {
      const modal = document.getElementById('emailModal');
      if (e.target === modal) closeEmailModal();
    });

    loadCountriesData();
  </script>
</body>
</html>
